

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TEAM S-H-T </title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<link rel="icon" type="image/png" href="images/logo.png">
<style>
@keyframes fade-in { from {opacity:0; transform:translateY(10px);} to {opacity:1; transform:translateY(0);} }
@keyframes slide-up { from {opacity:0; transform:translateY(20px);} to {opacity:1; transform:translateY(0);} }
.animate-fade-in { animation: fade-in 0.8s ease-out forwards; }
.animate-slide-up { animation: slide-up 0.8s ease-out forwards; }
</style>

<body class="min-h-screen bg-gradient-to-br from-yellow-50 via-yellow-100 to-yellow-200 flex flex-col">



<!-- Contact Section -->
<main class="flex-grow py-16">
  <div class="max-w-6xl mx-auto px-6 grid md:grid-cols-2 gap-10 items-center">

    <!-- Info -->
    <div class="animate-fade-in">
      <h2 class="text-4xl font-bold text-yellow-900 mb-4"> Complain Us –</h2>
      <p class="text-yellow-800 mb-6 leading-relaxed">
         Questions? Need a quote? Complain ? Our support team is here 24/7 to assist you.
      </p>

      <div class="space-y-5 text-yellow-900">
        <div class="flex items-center space-x-4">
          <div class="bg-yellow-100 p-3 rounded-full">
            <i class="fa-solid fa-envelope text-yellow-700 text-lg"></i>
          </div>
          <span class="font-medium">teamshtitinstitute@gmail.com</span>
        </div>
        <div class="flex items-center space-x-4">
          <div class="bg-yellow-100 p-3 rounded-full">
            <i class="fa-solid fa-phone-volume text-yellow-700 text-lg"></i>
          </div>
          <span class="font-medium">+880 1783972659</span>
        </div>
        <div class="flex items-center space-x-4">
          <div class="bg-yellow-100 p-3 rounded-full">
            <i class="fa-solid fa-location-dot text-yellow-700 text-lg"></i>
          </div>
          <span class="font-medium">TEAM S-H-T ,Bangladesh </span>
        </div>
        <div class="flex items-center space-x-4">
          <div class="bg-yellow-100 p-3 rounded-full">
            <i class="fa-solid fa-comments text-yellow-700 text-lg"></i>
          </div>
          <span class="font-medium">Live Chat – 24/7</span>
        </div>
      </div>
    </div>

    <!-- Contact Form -->
    <form method="POST" action="https://formsubmit.co/teamshtitinstitute@gmail.com" class="bg-yellow-50 p-8 rounded-2xl shadow-2xl border border-yellow-200 animate-slide-up">
      
      <div class="mb-4">
        <label class="block text-yellow-900 font-medium mb-1">Full Name</label>
        <input type="text" name="text" class="w-full border border-yellow-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-yellow-400 focus:border-yellow-400" required placeholder=" Your Name">
               
      </div>

      <div class="mb-4">
        <label class="block text-yellow-900 font-medium mb-1">Email Address</label>
        <input type="email" name="email" class="w-full border border-yellow-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-yellow-400 focus:border-yellow-400" required placeholder="Email Address">
               
      </div>

      <div class="mb-6">
        <label class="block text-yellow-900 font-medium mb-1">Message</label>
        <textarea type="text" name="massage" rows="5" class="w-full border border-yellow-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-yellow-400 focus:border-yellow-400" required placeholder="Enter You Massage"></textarea>
                  
      </div>
<input type="hidden" name="_captcha" value="false">
      <button type="submit"
              class="w-full bg-yellow-600 text-white py-3 rounded-lg font-semibold hover:bg-yellow-700 shadow-md transition">
        Send Message
      </button>
      <div class="pt-6" style="text-align: center;">
          <a href="Scam.html"
             class="inline-flex items-center gap-3 bg-yellow-500 hover:bg-yellow-600
                    text-black font-semibold px-8 py-3 rounded-xl
                    shadow-[0_0_20px_rgba(250,204,21,0.6)]
                    transition">
            <i class="fas fa-tower-broadcast"></i>
             Scam Report 
          </a>
        </div>
    </form>
    <input type="hidden" name="_next" value="thanks.html">
  </div>
</main>

<!-- Footer -->
<footer class="bg-yellow-100 text-center py-6 text-yellow-900 border-t border-yellow-200">
